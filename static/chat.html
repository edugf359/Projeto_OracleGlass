<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — OracleGlass</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message { display: flex; }
    .message.user { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }
    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
    }
    .message.user .bubble {
      background: var(--brand);
      color: var(--white);
      border-bottom-right-radius: 4px;
    }
    .message.assistant .bubble {
      background: var(--white);
      border: 1px solid var(--gray-200);
      color: var(--gray-800);
      border-bottom-left-radius: 4px;
    }
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
    }
    .typing-bubble span {
      width: 7px;
      height: 7px;
      background: var(--gray-300);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
    .sources-wrapper { display: flex; flex-direction: column; gap: 6px; }
    .sources-label { font-size: 11px; font-weight: 500; color: var(--gray-400); text-transform: uppercase; letter-spacing: .04em; padding-left: 2px; }
    .source-card {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 10px;
      padding: 10px 12px;
    }
    .source-text { font-size: 12px; color: #92400e; line-height: 1.5; }
    .chat-input-bar {
      border-top: 1px solid var(--gray-200);
      background: var(--white);
      padding: 14px 16px;
    }
    .chat-input-inner {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 760px;
      margin: 0 auto;
    }
    #msg-input {
      flex: 1;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius-lg);
      padding: 10px 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
      min-height: 42px;
      max-height: 140px;
      transition: border-color 0.15s;
    }
    #msg-input:focus { border-color: var(--brand); }
    #send-btn {
      padding: 10px 18px;
      background: var(--brand);
      color: var(--white);
      border-radius: var(--radius);
      font-weight: 500;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    #send-btn:hover { background: var(--brand-hover); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">OracleGlass</div>
    <div class="sidebar-new">
      <a href="/new" class="btn-new">+ Novo chat</a>
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </aside>

  <main class="chat-main">
    <div id="messages"></div>

    <div class="chat-input-bar">
      <div class="chat-input-inner">
        <textarea
          id="msg-input"
          rows="1"
          placeholder="Faça uma pergunta sobre os documentos..."
        ></textarea>
        <button id="send-btn">Enviar</button>
      </div>
    </div>
  </main>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/chat.js"></script>
</body>
</html>
